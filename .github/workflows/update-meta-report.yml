name: Update Meta Ads Report

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/fetch-meta-report.py"
      - ".github/workflows/update-meta-report.yml"
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate Meta Ads period reports
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_API_VERSION: v25.0
          META_LEVEL: account
          REPORT_BRAND: The Clarity Shop
          REPORT_CAMPAIGN: Sales / Purchase test
        run: |
          set -euo pipefail

          for preset in today yesterday last_7d last_14d last_30d this_month last_month maximum; do
            META_DATE_PRESET="$preset" python scripts/fetch-meta-report.py
            cp "reports/meta-ads/latest.html" "reports/meta-ads/${preset}.html"
          done

          cp "reports/meta-ads/dashboard.html" "reports/meta-ads/latest.html"

      - name: Commit report update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/meta-ads/*.html reports/meta-ads/archive/*.html
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Update Meta Ads live report"
            git push
          fi
